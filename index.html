<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Assignment Countdown Dashboard</title>
    <link rel="stylesheet" href="countdown.css" />
  </head>
  <body>
    <h1>Assignment Countdown Dashboard</h1>

    <div class="form-container">
      <input
        type="text"
        id="newTitle"
        placeholder="e.g., COS2611 Asign-2"
        required
      />
      <input type="datetime-local" id="newDue" required />
      <button id="addBtn">Add Assignment</button>
    </div>

    <div class="controls-container">
      <input type="text" id="searchBox" placeholder="Search assignments..." />
      <select id="sortSelect">
        <option value="due">Sort by Due Date</option>
        <option value="title">Sort by Title</option>
      </select>
    </div>

    <div class="tiles-container" id="tilesContainer"></div>

    <script src="countdown.js"></script>
  </body>
</html>
